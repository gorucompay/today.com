<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection Check</title>
    <style>
        :root { --primary-blue: #2563eb; --light-grey: #f8fafc; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--light-grey); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: #1e293b; }
        .box { background: #ffffff; padding: 50px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.04); text-align: center; max-width: 360px; width: 85%; border: 1px solid #e2e8f0; }
        
        /* Smooth Spinner */
        .loader { width: 40px; height: 40px; border: 3px solid #f1f5f9; border-top-color: var(--primary-blue); border-radius: 50%; display: inline-block; animation: rotation 0.8s linear infinite; margin-bottom: 25px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 1.2rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
        p { font-size: 0.9rem; color: #64748b; line-height: 1.5; margin-bottom: 25px; }
        
        /* Stealth Progress Bar */
        .progress-container { width: 100%; height: 5px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-blue); transition: width 3.2s cubic-bezier(0.1, 0, 0.3, 1); }
        .secure-tag { margin-top: 15px; font-size: 0.7rem; color: #cbd5e1; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

            setTimeout(() => {
                // Masking the source to look like it's coming from a blog/blank referrer

</html>
