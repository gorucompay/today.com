<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Connection...</title>
    <style>
        /* Minimalist Professional UI */
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
        }

        /* Professional Blue Spinner */
        .loader { 
            width: 48px; 
            height: 48px; 
            border: 5px solid #f3f3f3; 
            border-bottom-color: #2563eb; 
            border-radius: 50%; 
            animation: rotation 1s linear infinite; 
            margin-bottom: 20px;
        }

        @keyframes rotation { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .text {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        /* Loading Progress Bar */
        .progress-bar {
            width: 160px;
            height: 4px;
            background: #f1f5f9;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2563eb;
            transition: width 3.2s linear;
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Please wait...</div>
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>

    <script>
        (function() {
            // --- 1. CONFIGURATION ---
            const targetOffer = "https://rewardsrock.com/r/eyJ0Ijoia2FzaGtpY2siLCJ1IjoiNjlhMjM2M2M2ODliZDhjYWJlMDA1MzFmIiwidHMiOjE3NzI2NTE3MTMxODZ9?s1=69a2363c689bd8cabe00531f&offer_id=kashkick";
            const redirectDelay = 3200; // 3.2 seconds for realistic loading

            // Trigger progress bar animation
            setTimeout(() => {
                const fill = document.getElementById('fill');
                if(fill) fill.style.width = '100%';
            }, 100);

            // --- 2. STEALTH & BOT PROTECTION ---
            const ua = navigator.userAgent;
            
            // Block known bot signatures and headless browsers
            const isBot = (
                navigator.webdriver || 
                !navigator.languages || 
                navigator.languages.length === 0 ||
                /bot|googlebot|crawler|spider|robot|headless|lighthouse/i.test(ua)
            );

            if (isBot) {
                // Silently redirect bots to Google to protect the link from being flagged
                window.location.replace("https://www.google.com");
                return;
            }

            // --- 3. REFERRER SPOOFING (The "Blogger" Trick) ---
            // This strips the 'GitHub' source so the advertiser sees 'Direct' or 'Blogger' traffic
            const stripReferrer = () => {
                const meta = document.createElement('meta');
                meta.name = "referrer";
                meta.content = "no-referrer"; 
                document.getElementsByTagName('head')[0].appendChild(meta);
            };

            // --- 4. EXECUTE REDIRECT ---
            setTimeout(function() {
                stripReferrer();
                
                // Create a clean ghost link
                const ghostLink = document.createElement('a');
                ghostLink.href = targetOffer;
                ghostLink.rel = 'noreferrer'; // Double protection layer
                ghostLink.style.display = 'none';
                document.body.appendChild(ghostLink);

                // Perform the jump
                window.location.replace(targetOffer);
                ghostLink.click();
            }, redirectDelay);
        })();
    </script>
</body>
</html>
